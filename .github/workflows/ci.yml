name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install .
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest
